<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO Meta Tags -->
  <meta name="description" content="NowDesk - chang-zy 的个人实时新闻阅读台，聚合热点、实时和关注源" />
  <meta name="keywords" content="新闻,科技新闻,实时新闻,新闻聚合,NowDesk,NewsNow" />
  <meta name="author" content="chang-zy" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="NowDesk - 个人实时新闻阅读台" />
  <meta property="og:description" content="聚合热点、实时和关注源的 personal edition 新闻阅读界面" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://github.com/chang-zy/newsnow" />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NowDesk - 个人实时新闻阅读台" />
  <meta name="twitter:description" content="聚合热点、实时和关注源的 personal edition 新闻阅读界面" />
  <meta name="twitter:image" content="/og-image.png" />

  <meta name="theme-color" content="#0f7b63" />
  <link rel="preload" href="/Baloo2-Bold.subset.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

  <!-- Schema.org markup for Google -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NowDesk",
      "url": "https://github.com/chang-zy/newsnow",
      "description": "chang-zy 的个人实时新闻阅读台，聚合热点、实时和关注源"
    }
  </script>

  <script>
    const query = new URLSearchParams(window.location.search)
    if (query.has("login") && query.has("user") && query.has("jwt")) {
      localStorage.setItem("user", query.get("user"))
      localStorage.setItem("jwt", JSON.stringify(query.get("jwt")))
      window.history.replaceState({}, document.title, window.location.pathname)
    }
  </script>
  <title>NowDesk</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
